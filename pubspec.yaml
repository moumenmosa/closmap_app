name: closemap
description: CloseMap - location-based job marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  intl: ^0.20.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0
  geolocator: ^13.0.4
  geohash_plus: ^1.0.3
  http: ^1.3.0
  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  flutter_local_notifications: ^19.0.0
  file_picker: 10.3.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  crypto: ^3.0.6
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.0
  equatable: ^2.0.7
  firebase_storage: ^12.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/design/
    - seed/seed_data.json
